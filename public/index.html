<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FestQuest | Explora festivales de Colombia</title>
  <meta
    name="description"
    content="FestQuest te ayuda a descubrir festivales, municipios, cultura, turismo y experiencias auténticas en Colombia."
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe7cc 50%, #ffd6a5 100%);
      color: #1f2937;
      line-height: 1.5;
    }
    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px;
    }
    header {
      padding: 22px 0;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-size: 28px;
      font-weight: 800;
      color: #c2410c;
      letter-spacing: 0.2px;
    }
    .brand small {
      display: block;
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav a, .btn {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      transition: .2s ease;
      display: inline-block;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary {
      background: #ea580c;
      color: white;
      box-shadow: 0 8px 22px rgba(234,88,12,.22);
    }
    .btn-primary:hover { transform: translateY(-1px); background: #c2410c; }
    .btn-secondary {
      background: white;
      color: #c2410c;
      border: 1px solid rgba(194,65,12,0.18);
    }
    .btn-secondary:hover { transform: translateY(-1px); }
    .hero {
      padding: 72px 0 44px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 28px;
      align-items: center;
    }
    .eyebrow {
      display: inline-block;
      background: rgba(234,88,12,.1);
      color: #c2410c;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 56px;
      line-height: 1.02;
      margin-bottom: 18px;
      color: #111827;
    }
    .hero p {
      font-size: 20px;
      color: #4b5563;
      margin-bottom: 26px;
      max-width: 680px;
    }
    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .hero-note {
      font-size: 14px;
      color: #6b7280;
      font-weight: 600;
    }
    .hero-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 46px rgba(0,0,0,0.08);
    }
    .hero-card h3 {
      font-size: 24px;
      margin-bottom: 14px;
      color: #c2410c;
    }
    .hero-card ul {
      list-style: none;
      display: grid;
      gap: 12px;
    }
    .hero-card li {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 600;
      color: #7c2d12;
    }
    section {
      padding: 26px 0 40px;
    }
    .section-title {
      font-size: 34px;
      margin-bottom: 12px;
      color: #111827;
    }
    .section-subtitle {
      color: #6b7280;
      margin-bottom: 24px;
      max-width: 820px;
      font-size: 17px;
    }
  </style>
</head>
<body>

<header>...</header>

<main>
<section class="hero">
  <div class="container hero-grid">
    <div>
      <span class="eyebrow">Descubre Colombia a través de sus festivales</span>
      <h1>Una forma más inteligente...</h1>

      <!-- ANEXO MINIMO -->
      <div style="margin-top:15px;">
        <strong>Abril y Mayo 2026:</strong>
        <div id="festivales-inline"></div>
      </div>

    </div>

    <div class="hero-card">...</div>
  </div>
</section>

<!-- resto igual EXACTO -->

</main>

<footer>...</footer>

<!-- SCRIPT -->
<script>
fetch('/api/festivals')
  .then(res => res.json())
  .then(data => {

    const cont = document.getElementById('festivales-inline');
    if (!cont) return;

    const filtrados = data
      .filter(f => f.fecha && (f.fecha.includes('2026-04') || f.fecha.includes('2026-05')))
      .slice(0, 6);

    cont.innerHTML = filtrados.map(f =>
      `<div>🎉 ${f.nombre} – ${f.municipio || ''}</div>`
    ).join('');

  });
</script>

</body>
</html>
